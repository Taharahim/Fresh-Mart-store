<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | FreshMart</title>

```
<link rel="stylesheet" href="assets/css/style.css">

<style>
    .checkout-container{
        max-width:1200px;
        margin:40px auto;
        padding:20px;
        display:grid;
        grid-template-columns:2fr 1fr;
        gap:30px;
    }

    .checkout-card{
        background:#fff;
        border-radius:12px;
        padding:25px;
        box-shadow:0 4px 15px rgba(0,0,0,.08);
    }

    .checkout-card h2{
        margin-bottom:20px;
    }

    .form-group{
        margin-bottom:15px;
    }

    .form-group label{
        display:block;
        margin-bottom:6px;
        font-weight:600;
    }

    .form-group input,
    .form-group select,
    .form-group textarea{
        width:100%;
        padding:12px;
        border:1px solid #ddd;
        border-radius:8px;
    }

    .place-order{
        width:100%;
        padding:14px;
        background:#2ecc71;
        color:white;
        border:none;
        border-radius:8px;
        font-size:16px;
        cursor:pointer;
    }

    .summary-item{
        display:flex;
        justify-content:space-between;
        margin-bottom:10px;
    }

    @media(max-width:768px){
        .checkout-container{
            grid-template-columns:1fr;
        }
    }
</style>
</head>
<body>
<header class="navbar">
  <div class="logo">FreshMart</div>

  <nav>
    <a href="index.html">Home</a>
    <a href="products.html">Products</a>
    <a href="deals.html">Delivery</a>
    <a href="cart.html">Cart (<span id="cartCount">0</span>)</a>
    <a href="contact.html">Contact</a>
  </nav>

  <div class="nav-actions">
    <button class="btn">Login</button>
  </div>
</header>

<section class="hero">
  <div class="hero-content">
   <h1>Complete Your Order</h1>
<p>Shop fruits, vegetables, dairy & daily essentials at best prices.</p>

<div class="hero-buttons">
<button class="btn">Start Shopping</button>
</div>
</section>
<div class="checkout-container">
<div class="checkout-card">

    <h2>Billing Details</h2>

    <div class="form-group">
        <label>Full Name</label>
        <input type="text">
    </div>

    <div class="form-group">
        <label>Email Address</label>
        <input type="email">
    </div>

    <div class="form-group">
        <label>Phone Number</label>
        <input type="tel">
    </div>

    <div class="form-group">
        <label>City</label>
        <input type="text">
    </div>

    <div class="form-group">
        <label>Address</label>
        <textarea rows="4"></textarea>
    </div>

    <div class="form-group">
        <label>Payment Method</label>

        <select>
            <option>Cash on Delivery</option>
            <option>Credit Card</option>
            <option>Debit Card</option>
        </select>
    </div>

    <button
        class="place-order"
        onclick="placeOrder()"
    >
        Place Order
    </button>

</div>

<div class="checkout-card">

    <h2>Order Summary</h2>

    <div id="summaryItems"></div>

    <hr>

    <div class="summary-item">
        <strong>Total</strong>
        <strong id="orderTotal">$0.00</strong>
    </div>

</div>
```

</div>

<script>

const cart =
JSON.parse(
localStorage.getItem("cart")
) || [];

const summary =
document.getElementById(
"summaryItems"
);

const totalEl =
document.getElementById(
"orderTotal"
);

let total = 0;

summary.innerHTML =
cart.map(item => {

    total +=
    item.price *
    item.quantity;

    return `
        <div class="summary-item">
            <span>
                ${item.name}
                x ${item.quantity}
            </span>

            <span>
                $${(
                    item.price *
                    item.quantity
                ).toFixed(2)}
            </span>
        </div>
    `;
}).join("");

totalEl.textContent =
"$" + total.toFixed(2);

function placeOrder(){

    alert(
      "Order placed successfully!"
    );

    localStorage.removeItem(
      "cart"
    );

    window.location.href =
    "index.html";
}

</script>

</body>
</html>
